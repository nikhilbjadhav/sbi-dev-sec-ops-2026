name: EMS DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  devsecops:
    name: Build + SAST + DAST
    runs-on: ubuntu-latest

    steps:

    # ── 1. Checkout ──────────────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0        # required by SonarQube for blame info

    # ── 2. Java setup ────────────────────────────────────────────
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ── 3. Build + Test (JaCoCo coverage collected here) ────────
    - name: Build and test
      run: mvn clean verify -q
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

    # ── 4. SAST — SonarCloud ─────────────────────────────────────
    - name: SAST — SonarCloud scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        JWT_SECRET:  ${{ secrets.JWT_SECRET_TEST }}
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=nikhilbjadhav_sbi-dev-sec-ops-2026 \
          -Dsonar.organization=nikhilbjadhav \
          -Dsonar.login=$SONAR_TOKEN

    # ── 5. Docker Build ──────────────────────────────────────────
    - name: Build Docker image
      run: docker build -t sbi-ems:${{ github.sha }} .

       # ── 6. Start app for DAST ────────────────────────────────────
    - name: Start EMS container
      run: |
        # Use --network host so ZAP can reach the app via localhost
        docker run -d --name ems-dast \
          --network host \
          -e JWT_SECRET=${{ secrets.JWT_SECRET_TEST }} \
          sbi-ems:${{ github.sha }}

        echo "Waiting for app to be ready..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8080/actuator/health > /dev/null; then
            echo "✅ App is ready"
            break
          fi
          echo "...waiting (attempt $i)"
          if [ $i -eq 30 ]; then
            echo "❌ App failed to start. Container logs:"
            docker logs ems-dast
            exit 1
          fi
          sleep 5
        done

    # ── 7. DAST — OWASP ZAP ──────────────────────────────────────
    - name: DAST — OWASP ZAP
      run: |
        # Pre-create the file to avoid permission issues
        touch zap-report.html
        chmod 777 zap-report.html
        
        # Added -v $(pwd):/zap/wrk:rw to fix the mount error
        # Added --user root to ensure write permissions
        docker run --user root --network host \
          -v $(pwd):/zap/wrk:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-api-scan.py \
            -t http://localhost:8080/v3/api-docs \
            -f openapi \
            -r zap-report.html \
            -I
      continue-on-error: true

    - name: Upload ZAP report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: zap-report
        path: zap-report.html


    # ── 8. Cleanup ───────────────────────────────────────────────
    - name: Stop container
      if: always()
      run: docker stop ems-dast || true
